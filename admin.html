<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h1>Admin</h1>

<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="imagen" placeholder="URL Imagen">
<input id="categoria" placeholder="Categoria">
<input id="stock" type="number" placeholder="Stock">
<button onclick="agregarProducto()">Agregar</button>

<div id="productos"></div>

<script type="module">
import { db } from "./firebase.js";

const productosRef = db.collection("productos");

window.agregarProducto = async () => {
  await productosRef.add({
    nombre: nombre.value,
    precio: parseFloat(precio.value),
    imagen: imagen.value,
    categoria: categoria.value,
    stock: parseInt(stock.value)
  });
};

productosRef.onSnapshot((snapshot) => {
  let div = document.getElementById("productos");
  div.innerHTML = "";

  snapshot.forEach(docu => {
    let p = docu.data();

    div.innerHTML += `
    <div>
      <input value="${p.nombre}" onchange="editar('${docu.id}','nombre',this.value)">
      <input value="${p.precio}" onchange="editar('${docu.id}','precio',this.value)">
      <input value="${p.stock}" onchange="editar('${docu.id}','stock',this.value)">
    </div>`;
  });
});

window.editar = async (id, campo, valor) => {
  await db.collection("productos").doc(id).update({
    [campo]: valor
  });
};
</script>

</body>
</html>
