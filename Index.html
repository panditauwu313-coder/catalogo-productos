<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Catálogo de Productos</h1>
</header>

<section class="catalogo">

  <div class="product-card">
    <img src="https://via.placeholder.com/150">
    <h2>Sabritas</h2>
    <p class="price">$20</p>
    <button onclick="abrirFormulario('Sabritas', 20)">Pedir</button>
  </div>

  <div class="product-card">
    <img src="https://via.placeholder.com/150">
    <h2>Chocolate</h2>
    <p class="price">$15</p>
    <button onclick="abrirFormulario('Chocolate', 15)">Pedir</button>
  </div>

  <div class="product-card">
    <img src="https://via.placeholder.com/150">
    <h2>Galletas</h2>
    <p class="price">$10</p>
    <button onclick="abrirFormulario('Galletas', 10)">Pedir</button>
  </div>

</section>

<!-- POPUP -->
<div id="formPopup" class="form-popup">
  <form id="pedidoForm">
    <h2>Hacer Pedido</h2>

    <label>Nombre:</label>
    <input type="text" id="nombre" required>

    <label>Producto:</label>
    <input type="text" id="producto" readonly>

    <label>Cantidad:</label>
    <input type="number" id="cantidad" min="1" value="1" required>

    <p id="total">Total: $0</p>

    <label>Notas:</label>
    <textarea id="notas"></textarea>

    <button type="submit">Enviar Pedido</button>
    <button type="button" onclick="cerrarFormulario()">Cancelar</button>

    <div id="productos"></div>

<script type="module" src="script.js"></script>

  </form>
</div>

<script src="script.js"></script>

</body>
</html>
