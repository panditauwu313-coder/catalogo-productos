<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Catálogo de Productos</h1>
        </div>
    </header>

    <section class="catalogo">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 1">
           <h2>Producto 1</h2>
<p class="price">$10</p>
<p>Descripción breve del producto 1.</p>
            <button>Añadir al carrito</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 2">
            <h2>Producto 2</h2>
            <p>Descripción breve del producto 2.</p>
            <button>Añadir al carrito</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 3">
            <h2>Producto 3</h2>
            <p>Descripción breve del producto 3.</p>
            <button>Añadir al carrito</button>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Catalogo Online</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <section class="form-container">
  <h2>Hacer Pedido</h2>

  <form id="pedidoForm">
    
    <label>Nombre:</label>
    <input type="text" id="nombre" required>

    <label>Producto:</label>
    <select id="producto" required>
      <option value="">Selecciona un producto</option>
      <option value="Sabritas">Sabritas - $20</option>
      <option value="Chocolate">Chocolate - $15</option>
      <option value="Galletas">Galletas - $10</option>
    </select>

    <label>Cantidad:</label>
    <input type="number" id="cantidad" min="1" required>

    <label>Notas:</label>
    <textarea id="notas" placeholder="Opcional"></textarea>

    <button type="submit">Enviar Pedido</button>
  </form>

</section>
</body>
</html>
