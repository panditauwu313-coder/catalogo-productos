<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Catálogo de Productos</h1>
        </div>
    </header>

    <section class="catalogo">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 1">
           <h2>Producto 1</h2>
<p class="price">$10</p>
<p>Descripción breve del producto 1.</p>
            <button onclick="abrirFormulario('Sabritas', 20)">Pedir</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 2">
            <h2>Producto 2</h2>
            <p>Descripción breve del producto 2.</p>
            <button onclick="abrirFormulario('Chocolate', 15)">Pedir</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Producto 3">
            <h2>Producto 3</h2>
            <p>Descripción breve del producto 3.</p>
            <button onclick="abrirFormulario('Galletas', 10)">Pedir</button>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Catalogo Online</p>
        </div>
    </footer>

    
    <div id="formPopup" class="form-popup">
  <form id="pedidoForm">
    ...
  </form>
</div>
  <div id="formPopup" class="form-popup">
  <form id="pedidoForm">
    <h2>Hacer Pedido</h2>

    <label>Nombre:</label>
    <input type="text" id="nombre" required>

    <label>Producto:</label>
    <input type="text" id="producto" readonly>

    <label>Cantidad:</label>
    <input type="number" id="cantidad" min="1" required>

    <label>Notas:</label>
    <textarea id="notas"></textarea>

    <button type="submit">Enviar Pedido</button>
    <button type="button" onclick="cerrarFormulario()">Cancelar</button>
    <p id="total">Total: $0</p>
  </form>
</div>

</section>
<script src="script.js"></script>
</body>
</html>
