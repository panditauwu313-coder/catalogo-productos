<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h1>Panel Admin</h1>

<h2>Crear Categoría</h2>
<input id="nuevaCategoria">
<button onclick="crearCategoria()">Crear</button>

<h2>Agregar Producto</h2>
<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="imagen" placeholder="URL Imagen">
<input id="stock" type="number" placeholder="Stock">
<select id="categoriaSelect"></select>
<button onclick="agregarProducto()">Agregar</button>

<h2>Productos</h2>
<div id="productos"></div>

<h2>Pedidos</h2>
<button onclick="borrarPedidos()">Borrar pedidos</button>
<div id="pedidos"></div>

<h2>Reporte de ventas</h2>
<button onclick="reiniciarReporte()">Reiniciar reporte</button>
<div id="reporte"></div>

<script type="module">
import { db, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDocs } from "./firebase.js";

const productosRef = collection(db, "productos");
const categoriasRef = collection(db, "categorias");
const pedidosRef = collection(db, "pedidos");

// CREAR CATEGORÍA
window.crearCategoria = async () => {
  if (!nuevaCategoria.value) return alert("Pon nombre");
  await addDoc(categoriasRef, { nombre: nuevaCategoria.value });
};

// CARGAR CATEGORÍAS
onSnapshot(categoriasRef, snap => {
  let select = document.getElementById("categoriaSelect");
  select.innerHTML = "";

  snap.forEach(docu => {
    select.innerHTML += `<option value="${docu.data().nombre}">${docu.data().nombre}</option>`;
  });
});

// AGREGAR PRODUCTO
window.agregarProducto = async () => {
  if (!categoriaSelect.value) return alert("Selecciona categoría");

  await addDoc(productosRef, {
    nombre: nombre.value,
    precio: parseFloat(precio.value),
    imagen: imagen.value,
    stock: parseInt(stock.value),
    categoria: categoriaSelect.value
  });
};

// MOSTRAR PRODUCTOS (NO TOCADO, SOLO BOTÓN EXTRA)
onSnapshot(productosRef, snap => {
  let div = document.getElementById("productos");
  div.innerHTML = "";

  snap.forEach(docu => {
    let p = docu.data();

    div.innerHTML += `
    <div>
      <input value="${p.nombre}" onchange="editar('${docu.id}','nombre',this.value)">
      <input value="${p.precio}" onchange="editar('${docu.id}','precio',this.value)">
      <input value="${p.imagen}" onchange="editar('${docu.id}','imagen',this.value)">
      <input value="${p.stock}" onchange="editar('${docu.id}','stock',this.value)">
      <input value="${p.categoria}" onchange="editar('${docu.id}','categoria',this.value)">
      <button onclick="eliminarProducto('${docu.id}')">Eliminar</button>
    </div>`;
  });
});

// EDITAR (IGUAL)
window.editar = async (id, campo, valor) => {
  await updateDoc(doc(db, "productos", id), {
    [campo]: campo === "precio" || campo === "stock" ? Number(valor) : valor
  });
};

// ELIMINAR PRODUCTO
window.eliminarProducto = async (id) => {
  await deleteDoc(doc(db, "productos", id));
};

// PEDIDOS + REPORTE (IGUAL)
onSnapshot(pedidosRef, snap => {
  let div = document.getElementById("pedidos");
  let reporte = {};

  div.innerHTML = "";

  snap.forEach(docu => {
    let p = docu.data();

    div.innerHTML += `<p>Total: $${p.total}</p>`;

    p.productos.forEach(prod => {
      reporte[prod.nombre] = (reporte[prod.nombre] || 0) + 1;
    });
  });

  let repDiv = document.getElementById("reporte");
  repDiv.innerHTML = "<h3>Ventas:</h3>";

  for (let nombre in reporte) {
    repDiv.innerHTML += `<p>${nombre}: ${reporte[nombre]}</p>`;
  }
});

// BORRAR PEDIDOS
window.borrarPedidos = async () => {
  let snap = await getDocs(pedidosRef);

  snap.forEach(async (d) => {
    await deleteDoc(doc(db, "pedidos", d.id));
  });
};

// REINICIAR REPORTE
window.reiniciarReporte = async () => {
  let snap = await getDocs(pedidosRef);

  snap.forEach(async (d) => {
    await deleteDoc(doc(db, "pedidos", d.id));
  });
};
</script>

</body>
</html>
